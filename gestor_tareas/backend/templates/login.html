<!DOCTYPE html>
<html lang="{{ session.get('idioma', 'es') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ textos().login }} - TaskMaster Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

{% set t = textos() %}

<!-- BOTÓN IDIOMA -->
<div class="idioma-switch">
    <a href="/cambiar_idioma/es">ES</a> | 
    <a href="/cambiar_idioma/en">EN</a>
</div>

<div class="form-container">

    <!-- LOGO -->
    <div class="form-title">TaskMaster <span class="pro">Pro</span></div>

    {% if message %}
    <div class="message {{ 'error' if error else 'success' }}">
        {{ message }}
    </div>
    {% endif %}

    <form method="POST">
        <input type="email" name="email" placeholder="{{ t.email }}" required>
        <input type="password" name="password" placeholder="{{ t.password }}" required>
        <button type="submit">{{ t.login }}</button>
    </form>

    <p>
        {{ t.no_cuenta }}
        <a href="{{ url_for('register') }}">{{ t.registrarse }}</a>
    </p>

</div>

</body>
</html>
