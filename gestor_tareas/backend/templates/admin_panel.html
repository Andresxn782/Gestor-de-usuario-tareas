<!doctype html>
<html>
  <head>
    <title>Panel Administrador</title>
    <!-- Título de la página -->
    <!-- Hoja de estilos principal -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>

  <body>
    {% set t = textos() %}
    <!-- Guardar traducciones en variable 't' para uso más cómodo -->

    <!-- BOTÓN CAMBIO DE IDIOMA -->
    <div class="idioma-switch">
      <a href="/cambiar_idioma/es">ES</a> |
      <!-- Cambiar idioma a español -->
      <a href="/cambiar_idioma/en">EN</a>
      <!-- Cambiar idioma a inglés -->
    </div>

    <div class="panel-container">
      <!-- Contenedor principal del panel -->

      <!-- Título del panel con traducción -->
      <h1>{{ t.tareas }} - Admin</h1>

      <!-- Mensaje de bienvenida con el nombre del usuario -->
      <p>{{ t.bienvenido }}, {{ nombre }}</p>

      <div class="panel-menu">
        <!-- Menú de navegación del panel -->

        <!-- Enlace a la lista de trabajadores -->
        <a href="/admin/usuarios" class="panel-btn"> {{ t.trabajadores }} </a>

        <!-- Enlace a la gestión de tareas -->
        <a href="/admin/tareas" class="panel-btn"> {{ t.tareas }} </a>

        <!-- Enlace para cerrar sesión -->
        <a href="/logout" class="panel-btn logout"> {{ t.cerrar_sesion }} </a>
      </div>
      <!-- Cierre panel-menu -->
    </div>
    <!-- Cierre panel-container -->
  </body>
</html>
