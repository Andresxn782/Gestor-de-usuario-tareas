<!DOCTYPE html>
<html>
<head>
    <title>Panel Administrador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

{% set t = textos() %}

<!-- Botón idioma BIEN colocado -->
<div class="idioma-switch">
    <a href="/cambiar_idioma/es">ES</a> | 
    <a href="/cambiar_idioma/en">EN</a>
</div>

<div class="panel-container">

<h1>{{ t.tareas }} - Admin</h1>

<p>{{ t.bienvenido }}, {{ nombre }}</p>

<div class="panel-menu">

<a href="/admin/usuarios" class="panel-btn">
{{ t.trabajadores }}
</a>

<a href="/admin/tareas" class="panel-btn">
{{ t.tareas }}
</a>

<a href="/logout" class="panel-btn logout">
{{ t.cerrar_sesion }}
</a>

</div>

</div>

</body>
</html>
