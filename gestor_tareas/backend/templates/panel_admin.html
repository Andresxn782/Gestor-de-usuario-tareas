<!DOCTYPE html>
<html>

<head>
<title>Panel Administrador</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="panel-container">

<h1>Bienvenido, {{ nombre }}</h1>

<div class="panel-menu">

<a href="/panel" class="panel-btn">Usuarios</a>

<a href="/admin/tareas" class="panel-btn">Tareas</a>

<a href="/logout" class="panel-btn logout">Cerrar sesión</a>

</div>

<h2>Lista de Trabajadores</h2>

<table>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Rol</th>
</tr>

{% for usuario in usuarios %}

<tr>
<td>{{ usuario.id_usuario }}</td>
<td>{{ usuario.nombre }}</td>
<td>{{ usuario.email }}</td>
<td>{{ usuario.rol }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
<div class="idioma-switch">
    <a href="/cambiar_idioma/es">ES</a> | 
    <a href="/cambiar_idioma/en">EN</a>
</div>
</html>
