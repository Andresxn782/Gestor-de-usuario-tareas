<!doctype html>
<html>
  <head>
    <!-- Título de la página dinámico según traducción -->
    <title>{{ textos().tarea_grupal }}</title>
    <!-- Hoja de estilos principal -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>

  <body>
    {% set t = textos() %}
    <!-- Guardar traducciones en variable 't' para uso más cómodo -->

    <!-- BOTÓN CAMBIO DE IDIOMA -->
    <div class="idioma-switch">
      <a href="/cambiar_idioma/es">ES</a> |
      <!-- Cambiar idioma a español -->
      <a href="/cambiar_idioma/en">EN</a>
      <!-- Cambiar idioma a inglés -->
    </div>

    <div class="panel-container">
      <!-- Contenedor principal del panel -->

      <!-- Título de la sección -->
      <h1>{{ t.tarea_grupal }}</h1>

      <!-- FORMULARIO CREAR TAREA GRUPAL -->
      <form method="POST">
        <div class="form-section">
          <!-- Sección de información de la tarea -->

          <h2>{{ t.informacion_tarea }}</h2>

          <!-- Campo nombre de la tarea -->
          <input type="text" name="nombre" placeholder="{{ t.nombre_tarea }}" required />

          <!-- Campo descripción de la tarea -->
          <textarea name="descripcion" placeholder="{{ t.descripcion }}" required></textarea>
        </div>

        <div class="form-section">
          <!-- Sección de selección de trabajadores -->

          <h2>{{ t.trabajadores }}</h2>

          <div class="checkbox-group">
            <!-- Grupo de checkboxes -->

            <!-- Iterar sobre todos los usuarios disponibles -->
            {% for usuario in usuarios %}
            <label class="checkbox-item">
              <input type="checkbox" name="usuarios" value="{{ usuario.id_usuario }}" />
              <!-- Checkbox por usuario -->
              {{ usuario.nombre }}
              <!-- Mostrar nombre del trabajador -->
            </label>
            {% endfor %}
          </div>
        </div>

        <!-- Botón para enviar el formulario y crear la tarea grupal -->
        <button type="submit">{{ t.crear_tarea_grupal }}</button>
      </form>

      <br />

      <!-- Botón para volver a la lista de tareas -->
      <a href="/admin/tareas" class="panel-btn">{{ t.volver }}</a>
    </div>
    <!-- Cierre panel-container -->
  </body>
</html>
