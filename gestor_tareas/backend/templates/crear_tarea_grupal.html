<!DOCTYPE html>
<html>

<head>
<title>{{ textos().tarea_grupal }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

{% set t = textos() %}

<!-- BOTÓN IDIOMA -->
<div class="idioma-switch">
    <a href="/cambiar_idioma/es">ES</a> | 
    <a href="/cambiar_idioma/en">EN</a>
</div>

<div class="panel-container">

<h1>{{ t.tarea_grupal }}</h1>

<form method="POST">

<div class="form-section">

<h2>{{ t.informacion_tarea }}</h2>

<input type="text" name="nombre" placeholder="{{ t.nombre_tarea }}" required>

<textarea name="descripcion" placeholder="{{ t.descripcion }}" required></textarea>

</div>

<div class="form-section">

<h2>{{ t.trabajadores }}</h2>

<div class="checkbox-group">

{% for usuario in usuarios %}

<label class="checkbox-item">
<input type="checkbox" name="usuarios" value="{{ usuario.id_usuario }}">
{{ usuario.nombre }}
</label>

{% endfor %}

</div>

</div>

<button type="submit">{{ t.crear_tarea_grupal }}</button>

</form>

<br>

<a href="/admin/tareas" class="panel-btn">{{ t.volver }}</a>

</div>

</body>
</html>
