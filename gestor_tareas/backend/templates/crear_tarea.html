<!DOCTYPE html>
<html>

<head>
<title>Crear tarea</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="panel-container">

<h1>Crear nueva tarea</h1>

<form method="POST">

<!-- BLOQUE INFO -->
<div class="form-section">

<h2>Información de la tarea</h2>

<input type="text" name="nombre" placeholder="Nombre de la tarea" required>

<textarea name="descripcion" placeholder="Descripción de la tarea" required></textarea>

</div>

<!-- BLOQUE ASIGNACIÓN -->
<div class="form-section">

<h2>Asignación</h2>

<select name="usuario" required>
<option value="">Seleccionar trabajador</option>

{% for usuario in usuarios %}
<option value="{{ usuario.id_usuario }}">
{{ usuario.nombre }}
</option>
{% endfor %}

</select>

</div>

<button type="submit">Crear tarea</button>

</form>

<br>

<a href="/admin/tareas" class="panel-btn">Volver</a>

</div>

</body>
</html>
