<!doctype html>
<html lang="{{ session.get('idioma', 'es') }}">
  <!-- Idioma de la página según la sesión, por defecto español -->

  <head>
    <meta charset="UTF-8" />
    <!-- Codificación de caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Responsive design -->
    <title>{{ textos().panel_trabajador }} - TaskMaster Pro</title>
    <!-- Título dinámico según traducción -->

    <!-- Hoja de estilos principal -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

    <!-- Fuente Poppins desde Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    {% set t = textos() %}
    <!-- Guardar traducciones en variable 't' para uso más cómodo -->

    <!-- BOTÓN CAMBIO DE IDIOMA -->
    <div class="idioma-switch">
      <a href="/cambiar_idioma/es">ES</a> |
      <!-- Cambiar idioma a español -->
      <a href="/cambiar_idioma/en">EN</a>
      <!-- Cambiar idioma a inglés -->
    </div>

    <div class="panel-container">
      <!-- Contenedor principal del panel -->

      <!-- Mensaje de bienvenida con nombre del usuario -->
      <h1>{{ t.bienvenido }}, {{ nombre }}</h1>

      <!-- Subtítulo sección de mis tareas -->
      <h2>{{ t.mis_tareas }}</h2>

      <!-- TABLA DE TAREAS DEL TRABAJADOR -->
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>{{ t.tarea }}</th>
            <th>{{ t.descripcion }}</th>
            <th>{{ t.estado }}</th>
          </tr>
        </thead>

        <tbody>
          <!-- Iterar sobre todas las tareas asignadas al trabajador -->
          {% for tarea in tareas %}
          <tr>
            <td>{{ tarea.id_tarea }}</td>
            <td>{{ tarea.nombre }}</td>
            <td>{{ tarea.descripcion }}</td>

            <!-- ESTADO DE LA TAREA -->
            <td class="estado-{{ tarea.estado }}">
              <!-- Clase dinámica según estado para CSS -->

              <!-- FORMULARIO PARA CAMBIAR ESTADO -->
              <form method="POST" action="/actualizar_estado">
                <!-- ID de la tarea oculto -->
                <input type="hidden" name="id_tarea" value="{{ tarea.id_tarea }}" />

                <!-- Dropdown para cambiar el estado -->
                <select name="estado" onchange="this.form.submit()">
                  <!-- Envía el formulario al cambiar -->
                  <option
                    value="pendiente"
                    {%
                    if
                    tarea.estado=""
                    ="pendiente"
                    %}selected{%
                    endif
                    %}
                  >
                    {{ t.pendiente }}
                  </option>

                  <option
                    value="en_proceso"
                    {%
                    if
                    tarea.estado=""
                    ="en_proceso"
                    %}selected{%
                    endif
                    %}
                  >
                    {{ t.en_proceso }}
                  </option>

                  <option
                    value="finalizada"
                    {%
                    if
                    tarea.estado=""
                    ="finalizada"
                    %}selected{%
                    endif
                    %}
                  >
                    {{ t.finalizada }}
                  </option>
                </select>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

      <br />

      <!-- Botón cerrar sesión -->
      <a href="/logout" class="btn-logout"> {{ t.cerrar_sesion }} </a>
    </div>
    <!-- Cierre panel-container -->
  </body>
</html>
