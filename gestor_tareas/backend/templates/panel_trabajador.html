<!DOCTYPE html>
<html lang="{{ session.get('idioma', 'es') }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ textos().panel_trabajador }} - TaskMaster Pro</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

{% set t = textos() %}

<!-- BOTÓN IDIOMA -->
<div class="idioma-switch">
    <a href="/cambiar_idioma/es">ES</a> | 
    <a href="/cambiar_idioma/en">EN</a>
</div>

<div class="panel-container">

    <h1>{{ t.bienvenido }}, {{ nombre }}</h1>

    <h2>{{ t.mis_tareas }}</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>{{ t.tarea }}</th>
                <th>{{ t.descripcion }}</th>
                <th>{{ t.estado }}</th>
            </tr>
        </thead>

        <tbody>

            {% for tarea in tareas %}
            <tr>

                <td>{{ tarea.id_tarea }}</td>
                <td>{{ tarea.nombre }}</td>
                <td>{{ tarea.descripcion }}</td>

                <!-- ESTADO -->
                <td class="estado-{{ tarea.estado }}">

                    <form method="POST" action="/actualizar_estado">

                        <input type="hidden" name="id_tarea" value="{{ tarea.id_tarea }}">

                        <select name="estado" onchange="this.form.submit()">

                            <option value="pendiente" {% if tarea.estado == 'pendiente' %}selected{% endif %}>
                                {{ t.pendiente }}
                            </option>

                            <!-- 🔥 CORRECCIÓN IMPORTANTE -->
                            <option value="en_proceso" {% if tarea.estado == 'en_proceso' %}selected{% endif %}>
                                {{ t.en_proceso }}
                            </option>

                            <option value="finalizada" {% if tarea.estado == 'finalizada' %}selected{% endif %}>
                                {{ t.finalizada }}
                            </option>

                        </select>

                    </form>

                </td>

            </tr>
            {% endfor %}

        </tbody>
    </table>

    <br>

    <a href="/logout" class="btn-logout">
        {{ t.cerrar_sesion }}
    </a>

</div>

</body>
</html>
